name: Build & release XPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "tag: $TAG_VERSION   manifest: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --global web-ext@7

      - name: Build XPI
        run: |
          mkdir -p artifacts
          web-ext build --source-dir=. --artifacts-dir=artifacts --overwrite-dest
          for f in artifacts/*.zip; do mv "$f" "${f%.zip}.xpi"; done
          ls -la artifacts/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.xpi
          generate_release_notes: true
          body: |
            Unsigned XPI for self-hosted install.

            **Install:**
            1. In Thunderbird, open `about:config` and set `xpinstall.signatures.required` → `false`.
            2. Download the `.xpi` below.
            3. Add-ons Manager → cog ⚙ → *Install Add-on From File…* → select the XPI.
