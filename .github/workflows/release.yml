name: Build & sign XPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "tag: $TAG_VERSION   manifest: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install --global web-ext

      # web-ext lint skipped — uses Firefox rules, flags valid TB APIs.

      - name: Sign XPI (ATN, unlisted channel)
        env:
          WEB_EXT_API_KEY:    ${{ secrets.ATN_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.ATN_JWT_SECRET }}
        run: |
          mkdir -p artifacts
          web-ext sign \
            --source-dir=. \
            --artifacts-dir=artifacts \
            --channel=unlisted \
            --amo-base-url=https://addons.thunderbird.net/api/v5/ \
            --api-key="$WEB_EXT_API_KEY" \
            --api-secret="$WEB_EXT_API_SECRET" \
            --timeout=900000

      - name: Show signed artifact
        run: ls -la artifacts/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.xpi
          generate_release_notes: true
