name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm install --global web-ext

      # Skipping web-ext lint: it uses Firefox API rules and flags all
      # Thunderbird-only APIs as "unsupported". ATN has its own validator.

      - name: Build unsigned XPI
        run: |
          mkdir -p artifacts
          web-ext build --source-dir=. --artifacts-dir=artifacts --overwrite-dest
          # Rename to .xpi so the artifact is directly installable
          for f in artifacts/*.zip; do mv "$f" "${f%.zip}.xpi"; done

      - uses: actions/upload-artifact@v4
        with:
          name: folder-jump-unsigned
          path: artifacts/*.xpi
